<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drive — KarDinaL Solutions</title>
  <meta name="description" content="Mini open world 3D — conduis une Honda Civic EK dans une ville de nuit.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Définition unique du logo KDL — réutilisée par <use> ci-dessous -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <symbol id="kdl-logo" viewBox="0 0 44 52" fill="none">
      <line x1="10" y1="6"  x2="10" y2="44" stroke="#FDFAF5" stroke-width="3.5" stroke-linecap="butt"/>
      <line x1="10" y1="25" x2="27" y2="44" stroke="#FDFAF5" stroke-width="3"   stroke-linecap="butt"/>
      <line x1="10" y1="25" x2="23" y2="12" stroke="#FDFAF5" stroke-width="3"   stroke-linecap="butt"/>
      <path d="M 23,7 L 27,11 L 23,15 L 19,11 Z" fill="#A04040"/>
    </symbol>
  </defs>
</svg>

<canvas id="game-canvas"></canvas>
<div id="ui">
  <a href="../index.html" id="back-btn">
    <svg width="20" height="24" aria-hidden="true" style="flex-shrink:0"><use href="#kdl-logo"/></svg>
    ← Retour
  </a>
  <div id="minimap-wrap">
    <canvas id="minimap-canvas" width="180" height="180"></canvas>
    <div id="minimap-label">Carte</div>
  </div>
  <div id="hud">
    <canvas id="speed-gauge" width="172" height="172"></canvas>
  </div>
  <div id="controls-hint">ZQSD / ↑↓←→ · conduire &nbsp;·&nbsp; Espace · frein à main &nbsp;·&nbsp; C · caméra &nbsp;·&nbsp; H · phares</div>
</div>
<div id="touch-controls">
  <div class="touch-group">
    <div class="touch-btn" data-key="left">◀</div>
    <div class="touch-btn" data-key="right">▶</div>
  </div>
  <div class="touch-group">
    <div class="touch-btn" data-key="down">▼</div>
    <div class="touch-btn" data-key="up">▲</div>
  </div>
</div>
<div id="start-screen">
  <div class="start-inner">
    <div class="start-logo">
      <svg width="32" height="38" aria-hidden="true"><use href="#kdl-logo"/></svg>
      <div class="start-logo-wordmark">
        <span class="start-logo-name">KarDinaL</span>
        <span class="start-logo-sub">Solutions</span>
      </div>
    </div>
    <h1 class="start-title">Drive</h1>
    <p class="start-sub">Night city · <span>EK Civic</span> · Open world</p>
    <button id="start-btn" disabled onclick="startGame()">Chargement…</button>
    <div id="load-bar"><div id="load-bar-fill"></div></div>
    <p class="start-controls">ZQSD / Flèches → Conduire &nbsp;·&nbsp; Espace → Frein à main &nbsp;·&nbsp; C → Caméra &nbsp;·&nbsp; H → Phares</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="game.js"></script>
</body>
</html>
